version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    pre_build:
      - uv sync --group docs
      - uv run zensical --version

    build:
      html:
        - uv run zensical build --clean

    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html/
      - cp --recursive site/* $READTHEDOCS_OUTPUT/html/

python:
  install:
    - method: uv
