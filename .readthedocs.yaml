version: 2

build:
  os: ubuntu-24.04
  tools:
    python: latest
  jobs:
    build:
      html:
        - zensical build --clean
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html/
      - cp --recursive site/* $READTHEDOCS_OUTPUT/html/

python:
  install:
    - method: uv
      command: sync
      groups:
        - docs
