[project]
site_name = "faststream_fastapi"
site_description = "FastAPI plugin for FastStream"
site_author = "Ivan Kirpichnikov"
# site_url = "https://www.example.com/"

copyright = "Copyright &copy; 2026 Ivan Kirpichnikov"

nav = [
  { "Get started" = [
    { "Get started" = "index.md" },
  ] },
  { "Dependencies" = [
    { "Dependencies" = "dependencies/index.md" },
  ] },
  { "Context" = [
    { "Context" = "context/index.md" },
  ] },
  { "Background tasks" = [
    { "Background tasks" = "backgound_tasks/index.md" },
  ] },
  { "Lifespan" = [
    { "Lifespan" = "lifespan/index.md" },
  ] },
  { "AsyncAPI" = [
    { "Schema export" = "asyncapi/schema_export.md" },
    { "AsyncAPI Configure" = "asyncapi/asyncapi_configure.md" },
  ] },
  { "Testing" = [
    { "Testing" = "testing/index.md" },
  ] },
]

[project.theme]
variant = "modern"
#custom_dir = "overrides"
favicon = "assets/logo.svg"

language = "en"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "header.autohide",
  "navigation.expand",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.prune",
  "navigation.sections",
  # "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
  "toc.integrate",
]

logo = "assets/logo.svg"

[project.theme.font]
text = "Inter"
code = "Jetbrains Mono"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/IvanKirpichnikov/faststream_fastapi"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
auto_title = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]

[project.markdown_extensions.mkdocstrings]
default_handler = "python"

[project.markdown_extensions.mkdocstrings.handlers.python]
import = "https://docs.python.org/3/objects.inv"

[project.markdown_extensions.mkdocstrings.handlers.python.options]
show_root_heading = true
show_if_no_docstring = true
inherited_members = true
members_order = "source"
separate_signature = true
unwrap_annotated = true
merge_init_into_class = true
docstring_section_style = "spacy"
signature_crossrefs = true
show_symbol_type_heading = true
show_symbol_type_toc = true
show_docstring_attributes = false
show_signature_annotations = true
load_external_modules = true
